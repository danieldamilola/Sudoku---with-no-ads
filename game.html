<style>
        .board-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 1px;
            background-color: #E8EAED; /* Hairline borders */
            border: 2px solid #8892A4;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px 0 rgba(10, 0, 0, 0.05); /* Ambient Lift */
        }
        
        .board-cell {
            background-color: #FFFFFF;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3x3 Block borders */
        .board-cell:nth-child(3n) { border-right: 1.5px solid #8892A4; }
        .board-cell:nth-child(9n) { border-right: none; }
        .board-cell:nth-child(n+19):nth-child(-n+27),
        .board-cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 1.5px solid #8892A4; }

        /* Cell States */
        .cell-given { background-color: #F4F4F4; font-weight: 600; color: #1a1b23; }
        .cell-user { color: #4F6EF7; }
        .cell-selected { background-color: #EEF3FF; border: 2px solid #4F6EF7; z-index: 10; position: relative; }
        .cell-highlight { background-color: #F5F7FF; }
        .cell-error { background-color: #ffdad6; color: #ba1a1a; }
        
      </style>
