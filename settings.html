<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SUDOKU - Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "tertiary-fixed-dim": "#ffb68a",
                      "on-tertiary": "#ffffff",
                      "surface-bright": "#fbf8ff",
                      "inverse-surface": "#2f3039",
                      "on-error-container": "#93000a",
                      "surface-container-high": "#e8e7f3",
                      "secondary-container": "#e2e0fc",
                      "error-container": "#ffdad6",
                      "surface-dim": "#dad9e4",
                      "primary": "#2a4dd7",
                      "error": "#ba1a1a",
                      "secondary-fixed": "#e2e0fc",
                      "tertiary-container": "#bb5800",
                      "tertiary-fixed": "#ffdbc8",
                      "surface-container-lowest": "#ffffff",
                      "surface-tint": "#2d50d9",
                      "on-secondary-fixed-variant": "#45455b",
                      "on-primary-fixed-variant": "#0034c0",
                      "on-surface-variant": "#444654",
                      "primary-fixed": "#dde1ff",
                      "surface-container-highest": "#e2e1ed",
                      "surface-container-low": "#f4f2fe",
                      "secondary-fixed-dim": "#c6c4df",

              "borderRadius": {

                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"

              "spacing": {

                      "xl": "48px",
                      "sm": "8px",
                      "lg": "24px",
                      "xs": "4px",
                      "board-gutter": "2px",
                      "md": "16px",
                      "huge": "80px"
              },
              "fontFamily": {
                      "label-caps": [
                              "DM Sans"
                      ],
                      "meta-sm": [

                      ],

                      "body-strong": [

              "fontSize": {

                      "headline-md": [

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-huge md:pb-xl flex flex-col items-center">
<!-- TopAppBar -->
<header class="h-[56px] w-full bg-background flex items-center justify-between px-md md:hidden fixed top-0 z-40">
<button class="text-on-surface-variant hover:bg-surface-container active:scale-95 transition-transform duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-on-surface tracking-tight">Settings</h1>
<div class="w-10"></div> <!-- Placeholder for balance -->
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[600px] px-md pt-[80px] md:pt-xl pb-huge flex flex-col gap-lg">
<!-- Appearance Section -->
<section class="flex flex-col gap-sm">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase pl-xs tracking-wider">Appearance</h2>
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl shadow-[0_-4px_20px_0_rgba(10,0,0,0.02)] overflow-hidden">
<!-- Theme Toggle -->
<div class="flex items-center justify-between p-md border-b border-surface-variant">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary" data-icon="dark_mode">dark_mode</span>
<span class="font-body-main text-body-main text-on-surface">Dark Theme</span>
</div>
<!-- Toggle Switch -->
<button class="w-12 h-6 rounded-full bg-surface-variant relative transition-colors duration-200">
<div class="w-5 h-5 bg-white rounded-full absolute left-0.5 top-0.5 shadow-sm transition-transform duration-200"></div>
</button>
</div>
<!-- Board Style -->
<button class="w-full flex items-center justify-between p-md hover:bg-surface-container-lowest transition-colors active:bg-surface-container">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary" data-icon="grid_4x4">grid_4x4</span>
<div class="flex flex-col items-start">
<span class="font-body-main text-body-main text-on-surface">Board Style</span>
<span class="font-meta-sm text-meta-sm text-on-surface-variant">Classic</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Gameplay Section -->
<section class="flex flex-col gap-sm">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase pl-xs tracking-wider">Gameplay</h2>
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl shadow-[0_-4px_20px_0_rgba(10,0,0,0.02)] overflow-hidden">
<!-- Show Mistakes -->
<div class="flex items-center justify-between p-md border-b border-surface-variant">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary" data-icon="error">error</span>
<div class="flex flex-col">
<span class="font-body-main text-body-main text-on-surface">Show Mistakes</span>
<span class="font-meta-sm text-meta-sm text-on-surface-variant">Highlight incorrect entries</span>
</div>
</div>
<button class="w-12 h-6 rounded-full bg-primary relative transition-colors duration-200">
<div class="w-5 h-5 bg-white rounded-full absolute right-0.5 top-0.5 shadow-sm transition-transform duration-200"></div>
</button>
</div>
<!-- Highlight Duplicates -->
<div class="flex items-center justify-between p-md border-b border-surface-variant">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary" data-icon="highlight">highlight</span>
<div class="flex flex-col">
<span class="font-body-main text-body-main text-on-surface">Highlight Duplicates</span>
<span class="font-meta-sm text-meta-sm text-on-surface-variant">In row, column, and block</span>
</div>
</div>
<button class="w-12 h-6 rounded-full bg-primary relative transition-colors duration-200">
<div class="w-5 h-5 bg-white rounded-full absolute right-0.5 top-0.5 shadow-sm transition-transform duration-200"></div>
</button>
</div>
<!-- Timer Toggle -->
<div class="flex items-center justify-between p-md">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary" data-icon="timer">timer</span>
<span class="font-body-main text-body-main text-on-surface">Show Timer</span>
</div>
<button class="w-12 h-6 rounded-full bg-primary relative transition-colors duration-200">
<div class="w-5 h-5 bg-white rounded-full absolute right-0.5 top-0.5 shadow-sm transition-transform duration-200"></div>
</button>
</div>
</div>
</section>
<!-- Hints Section -->
<section class="flex flex-col gap-sm">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase pl-xs tracking-wider">Hints</h2>
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl shadow-[0_-4px_20px_0_rgba(10,0,0,0.02)] overflow-hidden">
<!-- Hints Per Game -->
<button class="w-full flex items-center justify-between p-md border-b border-surface-variant hover:bg-surface-container-lowest transition-colors active:bg-surface-container">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary" data-icon="lightbulb">lightbulb</span>
<div class="flex flex-col items-start">
<span class="font-body-main text-body-main text-on-surface">Hints Per Game</span>
<span class="font-meta-sm text-meta-sm text-on-surface-variant">Limited (3)</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Hint Type -->
<button class="w-full flex items-center justify-between p-md hover:bg-surface-container-lowest transition-colors active:bg-surface-container">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary" data-icon="psychology">psychology</span>
<div class="flex flex-col items-start">
<span class="font-body-main text-body-main text-on-surface">Hint Type</span>
<span class="font-meta-sm text-meta-sm text-on-surface-variant">Reveal Cell</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Sound & Haptics Section -->
<section class="flex flex-col gap-sm">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase pl-xs tracking-wider">Sound &amp; Haptics</h2>
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl shadow-[0_-4px_20px_0_rgba(10,0,0,0.02)] overflow-hidden">
<!-- Sound Effects -->
<div class="flex items-center justify-between p-md border-b border-surface-variant">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary" data-icon="volume_up">volume_up</span>
<span class="font-body-main text-body-main text-on-surface">Sound Effects</span>
</div>
<button class="w-12 h-6 rounded-full bg-surface-variant relative transition-colors duration-200">
<div class="w-5 h-5 bg-white rounded-full absolute left-0.5 top-0.5 shadow-sm transition-transform duration-200"></div>
</button>
</div>
<!-- Haptic Feedback -->
<div class="flex items-center justify-between p-md">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary" data-icon="vibration">vibration</span>
<span class="font-body-main text-body-main text-on-surface">Haptic Feedback</span>
</div>
<button class="w-12 h-6 rounded-full bg-primary relative transition-colors duration-200">
<div class="w-5 h-5 bg-white rounded-full absolute right-0.5 top-0.5 shadow-sm transition-transform duration-200"></div>
</button>
</div>
</div>
</section>
<!-- Destructive Actions -->
<section class="flex flex-col gap-sm mt-lg">
<div class="bg-surface-container-lowest border border-error-container rounded-xl shadow-[0_-4px_20px_0_rgba(10,0,0,0.02)] overflow-hidden">
<!-- Reset Statistics -->
<button class="w-full flex items-center justify-start p-md border-b border-error-container hover:bg-error-container transition-colors active:bg-error">
<div class="flex items-center gap-md text-error">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
<span class="font-body-strong text-body-strong">Reset Statistics</span>
</div>
</button>
<!-- Reset Progress -->
<button class="w-full flex items-center justify-start p-md hover:bg-error-container transition-colors active:bg-error">
<div class="flex items-center gap-md text-error">
<span class="material-symbols-outlined" data-icon="warning">warning</span>
<span class="font-body-strong text-body-strong">Clear All Progress</span>
</div>
</button>
</div>
<p class="font-meta-sm text-meta-sm text-on-surface-variant text-center mt-sm">App Version 1.4.2</p>
</section>
</main>
</body></html>
